<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Save Our Wildlife</h1>

        <video id="wildlifeVideo" controls aria-label="Wildlife conservation video">
            <source src="wildlife.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <p>
            Wildlife conservation helps protect endangered species and preserve
            biodiversity for future generations. Together, we can make a
            difference.
        </p>

        <button id="toggleBtn" aria-label="Hide or play video">
            Hide / Play Video
        </button>
    </main>

    <script src="script.js"></script>

</body>
</html>
